# SonarQube Cloud (or Server with SONAR_HOST_URL). Requires secret SONAR_TOKEN.
# Enable for push/PR by setting repo Variable SONAR_SCAN_ENABLED=true (Settings → Secrets and variables → Actions → Variables).
# Manual runs: Actions → SonarQube → Run workflow.
#
# On SonarCloud: create a project, then set sonar.organization and sonar.projectKey in sonar-project.properties.

name: SonarQube

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarqube:
    name: Scan
    runs-on: ubuntu-latest
    # Avoid failing forks/PRs without secrets; enable analysis when configured.
    if: >
      github.event_name == 'workflow_dispatch' || vars.SONAR_SCAN_ENABLED ==
      'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
