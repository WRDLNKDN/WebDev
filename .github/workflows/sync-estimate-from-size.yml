name: 📏 Sync Estimate from Size

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      owner_type:
        description: Project owner (org or user)
        required: true
        type: choice
        options:
          - org
          - user
      owner_login:
        description: Organization login or GitHub username
        required: true
        type: string
      project_number:
        description: Project number from the URL
        required: true
        type: number

permissions:
  contents: read
  repository-projects: write

concurrency:
  group: sync-estimate-from-size
  cancel-in-progress: false

jobs:
  sync-estimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Require Projects API token
        env:
          GITHUBACTION: ${{ secrets.GITHUBACTION }}
          GH_PROJECTS_TOKEN: ${{ secrets.GH_PROJECTS_TOKEN }}
        run: |
          if [ -z "$GITHUBACTION" ] && [ -z "$GH_PROJECTS_TOKEN" ]; then
            echo "::error::Add secret GITHUBACTION or GH_PROJECTS_TOKEN (PAT or GitHub App token with Projects + repo access). GITHUB_TOKEN cannot access GitHub Projects v2 — https://docs.github.com/en/issues/planning-and-tracking-with-projects/automating-your-project/automating-projects-using-actions"
            exit 1
          fi

      - name: Sync Estimate from Size
        uses: actions/github-script@v8
        env:
          GH_PROJECT_OWNER_TYPE:
            ${{ github.event.inputs.owner_type || vars.GH_PROJECT_OWNER_TYPE ||
            secrets.GH_PROJECT_OWNER_TYPE }}
          GH_PROJECT_OWNER_LOGIN:
            ${{ github.event.inputs.owner_login || vars.GH_PROJECT_OWNER_LOGIN
            || secrets.GH_PROJECT_OWNER_LOGIN }}
          GH_PROJECT_NUMBER:
            ${{ github.event.inputs.project_number || vars.GH_PROJECT_NUMBER ||
            secrets.GH_PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.GITHUBACTION || secrets.GH_PROJECTS_TOKEN }}
          script: |
            const run = require('./scripts/github-projects/set-estimate-from-size.cjs');
            await run({ github, context, core });
