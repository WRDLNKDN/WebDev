name: ♿ Nightly Accessibility Audit

on:
  schedule:
    # 08:00 UTC daily
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: WebDev-nightly-a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  accessibility:
    name: ♿ Nightly WCAG + Colorblind Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Opt into Node.js 24 for JavaScript actions (actions/checkout, actions/setup-node)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      VITE_SUPABASE_URL: 'https://example.supabase.co'
      VITE_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
      E2E_PORT: '5173'
      # Playwright backend webServer (optional): map repo secrets to expected names
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SRV_SERVICE_ROLE_KEY }}

      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: ♿ Run accessibility suite
        run: npm run test:e2e -- src/tests/e2e/accessibility.spec.ts
