# SonarQube / SonarCloud — scope analysis to source we own.
# Lighthouse (and similar) outputs embed minified/tool-generated JS/HTML that triggers
# no-op expression, dataset vs setAttribute, and other noise; they are not product code.
#
# SonarCloud: set sonar.organization to your org key (from sonarcloud.io → My Account → Organizations).
# sonar.projectKey must match the project key in SonarCloud (or pass -Dsonar.projectKey in CI).
sonar.projectKey=wrdlnkdn
sonar.organization=YOUR_SONARCLOUD_ORG_KEY

sonar.sourceEncoding=UTF-8
sonar.sources=src,backend

sonar.exclusions=\
  **/lighthouse-reports/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/blob-report/**,\
  *.report.html,\
  *.report.json,\
  **/*.report.html,\
  **/*.report.json,\
  src/types/supabase.ts

# Copy-paste detection: ignore generated Lighthouse / audit artifacts (not maintained source).
sonar.cpd.exclusions=\
  **/lighthouse-reports/**,\
  *.report.html,\
  *.report.json,\
  **/*.report.html,\
  **/*.report.json
