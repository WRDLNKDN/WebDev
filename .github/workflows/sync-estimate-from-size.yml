name: 📏 Sync Estimate from Size

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      owner_type:
        description: Project owner (org or user)
        required: true
        type: choice
        options:
          - org
          - user
      owner_login:
        description: Organization login or GitHub username
        required: true
        type: string
      project_number:
        description: Project number from the URL
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: sync-estimate-from-size
  cancel-in-progress: false

jobs:
  sync-estimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync Estimate from Size
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUBACTION || github.token }}
          script: |
            const run = require('./scripts/github-projects/set-estimate-from-size.cjs');
            await run({ github, context, core });
