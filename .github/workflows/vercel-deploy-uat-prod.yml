name: 🚀 Vercel Deploy UAT then PROD

# Redeploy from main: Actions → "🚀 Vercel Deploy UAT then PROD" → "Run workflow" → leave branch as main → Run.
# Re-run a completed run: open the run → "Re-run all jobs" (uses same ref as that run, e.g. main).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description:
          'Branch to deploy (default main — redeploy latest main to UAT)'
        required: true
        type: string
        default: 'main'
      deploy_prod:
        description:
          'Deploy to PRODUCTION (check this to deploy prod after UAT)'
        required: false
        type: boolean
        default: false

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-uat:
    name: 🚀 Vercel UAT
    runs-on: ubuntu-latest
    environment: uat

    env:
      # Opt into Node.js 24 for JavaScript actions (actions/checkout, actions/setup-node)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_UAT }}
      VERCEL_PROJECT_ID_UAT: ${{ secrets.VERCEL_PROJECT_ID_UAT }}

      # baked into build output — UAT domain (webdev-uat.vercel.app) gets this build
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_UAT_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_UAT_ANON_KEY }}
      VITE_APP_ENV: uat

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6
        with:
          ref:
            ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' &&
            inputs.ref || github.ref }}

      - name: 🧰 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✅ Deploy validation (typecheck, lint, format)
        run:
          npm run typecheck && npm run lint && npm run lint:md && npm run
          format:check

      - name: 🔐 Verify secrets (UAT)
        run: |
          set -e
          [ -n "${VERCEL_TOKEN:-}" ] || (echo "::error::Missing VERCEL_TOKEN" && exit 1)
          [ -n "${VERCEL_ORG_ID:-}" ] || (echo "::error::Missing VERCEL_ORG_ID" && exit 1)
          [ -n "${VERCEL_PROJECT_ID:-}" ] || (echo "::error::Missing VERCEL_PROJECT_ID_UAT" && exit 1)
          [ -n "${VITE_SUPABASE_URL:-}" ] || (echo "::error::Missing SUPABASE_UAT_URL" && exit 1)
          [ -n "${VITE_SUPABASE_ANON_KEY:-}" ] || (echo "::error::Missing SUPABASE_UAT_ANON_KEY" && exit 1)

      # -----------------------
      # Vercel (UAT)
      # -----------------------
      - name: Link Vercel project (UAT)
        run: |
          mkdir -p .vercel
          echo '{"orgId":"'"$VERCEL_ORG_ID"'","projectId":"'"$VERCEL_PROJECT_ID"'"}' > .vercel/project.json
          cat .vercel/project.json

      - name: 📥 Pull Vercel settings (UAT stage)
        run:
          npx --yes vercel@latest pull --yes --environment=production --token
          "$VERCEL_TOKEN"

      - name: 🧹 Clean build output and caches
        run: rm -rf dist node_modules/.vite

      - name: 🏗️ Build (UAT -> webdev-uat.vercel.app)
        run: npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: 🚀 Deploy (UAT stage)
        run:
          npx --yes vercel@latest deploy --prebuilt --prod --yes --token
          "$VERCEL_TOKEN"

  deploy-prod:
    name: 🚀 Vercel PROD (Production)
    runs-on: ubuntu-latest
    needs: deploy-uat

    # Prod deploys only when you explicitly request it via workflow_dispatch with "Also deploy production" checked.
    # Push to main deploys UAT only; no automatic prod publish.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_prod }}

    env:
      # Opt into Node.js 24 for JavaScript actions (actions/checkout, actions/setup-node)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
      VERCEL_PROJECT_ID_PROD: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      # baked into build output
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PROD_ANON_KEY }}
      VITE_APP_ENV: production

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6
        with:
          ref:
            ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' &&
            inputs.ref || github.ref }}

      - name: 🧰 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✅ Deploy validation (typecheck, lint, format)
        run:
          npm run typecheck && npm run lint && npm run lint:md && npm run
          format:check

      - name: 🔐 Verify secrets (PROD)
        run: |
          set -e
          [ -n "${VERCEL_TOKEN:-}" ] || (echo "::error::Missing VERCEL_TOKEN" && exit 1)
          [ -n "${VERCEL_ORG_ID:-}" ] || (echo "::error::Missing VERCEL_ORG_ID" && exit 1)
          [ -n "${VERCEL_PROJECT_ID:-}" ] || (echo "::error::Missing VERCEL_PROJECT_ID_PROD" && exit 1)
          [ -n "${VITE_SUPABASE_URL:-}" ] || (echo "::error::Missing SUPABASE_PROD_URL" && exit 1)
          [ -n "${VITE_SUPABASE_ANON_KEY:-}" ] || (echo "::error::Missing SUPABASE_PROD_ANON_KEY" && exit 1)

      - name: 🔗 Link Vercel project (PROD)
        run: |
          mkdir -p .vercel
          echo '{"orgId":"'"$VERCEL_ORG_ID"'","projectId":"'"$VERCEL_PROJECT_ID"'"}' > .vercel/project.json
          cat .vercel/project.json

      - name: 📥 Pull (production)
        run:
          npx --yes vercel@latest pull --yes --environment=production --token
          "$VERCEL_TOKEN"

      - name: 🧹 Clean build output and caches
        run: rm -rf dist node_modules/.vite

      - name: 🏗️ Build (production)
        run: npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: 🚀 Deploy (production)
        run:
          npx --yes vercel@latest deploy --prebuilt --prod --yes --token
          "$VERCEL_TOKEN"
