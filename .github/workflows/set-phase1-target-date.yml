name: 📅 Set Phase 1 Target Date

on:
  issues:
    types: [opened, edited, milestoned]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      owner_type:
        description: Project owner (org or user)
        required: true
        type: choice
        default: org
        options:
          - org
          - user
      owner_login:
        description: Organization login or GitHub username
        required: true
        type: string
        default: WRDLNKDN
      project_number:
        description: Project number from the URL
        required: true
        type: number
        default: 1

permissions:
  contents: read
  issues: read
  repository-projects: write

concurrency:
  group: set-phase1-target-date
  cancel-in-progress: false

jobs:
  set-target-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Require Projects API token
        env:
          GITHUBACTION: ${{ secrets.GITHUBACTION }}
        run: |
          if [ -z "$GITHUBACTION" ]; then
            echo "::error::Add secret GITHUBACTION or GH_PROJECTS_TOKEN (PAT or GitHub App token with Projects + repo access). GITHUB_TOKEN cannot access GitHub Projects v2 — https://docs.github.com/en/issues/planning-and-tracking-with-projects/automating-your-project/automating-projects-using-actions"
            exit 1
          fi

      - name: Set Target Date for Phase 1 when blank
        uses: actions/github-script@v8
        env:
          GH_PROJECT_OWNER_TYPE:
            ${{ github.event.inputs.owner_type || secrets.GH_PROJECT_OWNER_TYPE
            || vars.GH_PROJECT_OWNER_TYPE }}
          GH_PROJECT_OWNER_LOGIN:
            ${{ github.event.inputs.owner_login ||
            secrets.GH_PROJECT_OWNER_LOGIN || vars.GH_PROJECT_OWNER_LOGIN }}
          GH_PROJECT_NUMBER:
            ${{ github.event.inputs.project_number || secrets.GH_PROJECT_NUMBER
            || vars.GH_PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.GITHUBACTION || secrets.GH_PROJECTS_TOKEN }}
          script: |
            const run = require('./scripts/github-projects/set-phase1-target-date.cjs');
            await run({ github, context, core });
