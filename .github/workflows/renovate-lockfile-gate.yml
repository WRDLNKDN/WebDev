name: 🤖 Renovate Lockfile Gatekeeper

on:
  pull_request_target:
    types: [opened, synchronize, labeled, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  classify:
    name: 🏷️ Classify Renovate PR
    if:
      github.actor == 'renovate[bot]' && github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    outputs:
      is_lockfile_maintenance:
        ${{ steps.flags.outputs.is_lockfile_maintenance }}
      is_safe_automerge: ${{ steps.flags.outputs.is_safe_automerge }}
    steps:
      - name: Determine Renovate labels
        id: flags
        run: |
          labels="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          if echo "$labels" | grep -q 'lockfile-maintenance'; then
            echo "is_lockfile_maintenance=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_lockfile_maintenance=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$labels" | grep -q 'renovate:automerge-safe'; then
            echo "is_safe_automerge=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_safe_automerge=false" >> "$GITHUB_OUTPUT"
          fi

  gate:
    name: 🔒 Validate Renovate Lockfile Maintenance PR
    needs: classify
    if: >
      needs.classify.outputs.is_lockfile_maintenance == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Check PR files
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number }
            );
            const filenames = files.map(f => f.filename);
            const onlyLockfile = filenames.length === 1 && filenames[0] === 'package-lock.json';

            if (!onlyLockfile) {
              core.setFailed(`❌ Lockfile maintenance PR must only touch package-lock.json. Changed: ${filenames.join(', ')}`);
            } else {
              core.info('✅ Valid lockfile-only PR.');
            }

  approve:
    name: ✅ Auto-approve
    needs: [classify, gate]
    if: >
      always() && needs.classify.result == 'success' && (
        needs.classify.outputs.is_safe_automerge == 'true' ||
        needs.classify.outputs.is_lockfile_maintenance == 'true'
      ) && (
        needs.classify.outputs.is_lockfile_maintenance != 'true' ||
        needs.gate.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ github.token }}

  enable-automerge:
    name: 🔁 Enable GitHub Auto-Merge (SQUASH)
    needs: approve
    if: needs.approve.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 🔁 Enable native auto-merge
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;
            await github.graphql(
              `mutation ($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  clientMutationId
                }
              }`,
              { pullRequestId: pr.node_id }
            );
            core.info('✅ Auto-merge enabled for lockfile-maintenance PR.');
