name: 🔁 Reopen Issue on Done Sync

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      owner_type:
        description: Project owner (org or user)
        required: true
        type: choice
        options:
          - org
          - user
      owner_login:
        description: Organization login or GitHub username
        required: true
        type: string
      project_number:
        description: Project number from the URL
        required: true
        type: number

permissions:
  contents: read
  issues: write
  repository-projects: read

concurrency:
  group: reopen-issue-on-done-sync
  cancel-in-progress: false

jobs:
  reopen-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Reopen closed issue if project Status is Done
        uses: actions/github-script@v8
        env:
          GH_PROJECT_OWNER_TYPE: ${{ vars.GH_PROJECT_OWNER_TYPE }}
          GH_PROJECT_OWNER_LOGIN: ${{ vars.GH_PROJECT_OWNER_LOGIN }}
          GH_PROJECT_NUMBER: ${{ vars.GH_PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.GITHUBACTION || github.token }}
          script: |
            const run = require('./scripts/github-projects/reopen-on-done.cjs');
            await run({ github, context, core });
