name: ✅ CI - Quality Gate

on:
  pull_request:
    branches: [main]

  # Optional manual run (for e2e UI mode, or ad-hoc)
  workflow_dispatch:
    inputs:
      run_e2e_ui:
        description: 'Run Playwright UI mode (interactive). Not for normal CI.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: WebDev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webdev:
    name: ✅ WebDev CI (Quality + Unit + E2E)
    runs-on: ubuntu-latest

    env:
      # Opt into Node.js 24 for JavaScript actions (actions/checkout, actions/setup-node)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # Safe dummy values for build/test where needed
      VITE_SUPABASE_URL: 'https://example.supabase.co'
      VITE_SUPABASE_ANON_KEY: 'dummy-anon-key-for-ci'
      E2E_PORT: '5173'
      # Playwright backend webServer (optional): map repo secrets to expected names
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SRV_SERVICE_ROLE_KEY }}

      # If you still need this for react-helmet-async peer deps resolution
      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      # -----------------------
      # Quality + Unit (Vitest)
      # -----------------------
      - name: 🧹 ESLint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: 🧪 TypeScript typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: 🎨 Prettier check
        id: format
        continue-on-error: true
        run: npm run format:check

      - name: 🧫 Markdown lint
        id: mdlint
        continue-on-error: true
        run: npm run lint:md

      - name: 🧪 Vitest (unit)
        id: unit
        continue-on-error: true
        run: npm run test:unit

      # -------------
      # E2E (Playwright)
      # -------------
      - name: 🎭 Install Playwright Browsers
        id: pwinstall
        continue-on-error: true
        run: npx playwright install --with-deps chromium firefox

      - name: 🎭 Run Playwright tests (E2E)
        id: e2e
        continue-on-error: true
        run: npm run test:e2e

      # Optional: UI mode (manual only, run locally — no display in CI)
      - name: 🎭 Playwright UI mode (manual only, local use)
        if:
          github.event_name == 'workflow_dispatch' && inputs.run_e2e_ui ==
          'true' && env.CI != 'true'
        env:
          CI: ${{ env.CI }}
        run:
          echo "Skipping Playwright UI in CI (no display). Run npm run
          test:e2e:ui locally."

  summary:
    name: 🚦 WebDevExpected
    runs-on: ubuntu-latest
    needs: [webdev]
    if: always()

    steps:
      - name: 🚦 Summary gate
        run: |
          echo "webdev: ${{ needs.webdev.result }}"

          fail=0
          [ "${{ needs.webdev.result }}" = "success" ] || fail=1

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "❌ CI quality gate failed"
            exit 1
          fi

          echo ""
          echo "✅ CI quality gate passed"
