<!doctype html>
<html lang="en">

      name="viewport"

    />

    <link rel="icon" type="image/png" href="/assets/square%20logo.png" />
    <link rel="apple-touch-icon" href="/assets/square%20logo.png" />
    <meta name="theme-color" content="#121212" />

    <!-- Performance: Preconnect to Supabase for faster API calls on mobile -->
    <link
      rel="preconnect"
      href="https://rpcaazmxymymqdejevtb.supabase.co"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://rpcaazmxymymqdejevtb.supabase.co" />

    <!--
      Avoid global <link rel="preload"> for marketing-only assets: on app routes
      (e.g. /dashboard) they trigger "not used" warnings. Home uses
      <video poster="/assets/video/hero-bg-poster.jpg"> so the poster loads in
      context (no orphan preload).
    -->

    <title>Business, but weirder. | WRDLNKDN</title>
    <meta
      name="description"
      content="WRDLNKDN is a networking platform…that doesn't feel like networking. For people who build, create, and think differently."

    <link rel="canonical" href="https://wrdlnkdn.com" />

    <meta name="robots" content="index, follow" />

    <meta property="og:url" content="https://wrdlnkdn.com" />
    <meta property="og:title" content="Business, but weirder." />

      property="og:description"

    <meta property="og:image" content="https://wrdlnkdn.com/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:description"

    <meta name="twitter:image" content="https://wrdlnkdn.com/og-image.png" />

        "name": "WRDLNKDN",
        "url": "https://wrdlnkdn.com",
        "logo": "https://wrdlnkdn.com/assets/square%20logo.png",
        "description": "WRDLNKDN is a networking platform…that doesn't feel like networking. For people who build, create, and think differently."

  <body
