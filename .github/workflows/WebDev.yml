# .github/workflows/WebDev.yml
name: 🌐 WebDev

on:
  pull_request:
    branches: [main]

concurrency:
  group: WebDev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-unit:
    name: ✅ Quality + Vitest
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 ESLint
        run: npm run lint

      - name: 🧪 TypeScript typecheck
        run: npm run typecheck

      - name: 🎨 Prettier check
        run: npm run format:check

      # --- RLS tests need a real Supabase + env vars in CI ---
      - name: 🧰 Ensure jq is available (for env export)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: 🧱 Start Supabase (local)
        run: |
          npx supabase start

      - name: 🔐 Export Supabase env for Vitest (RLS suites)
        run: |
          npx supabase status --output json > supabase-status.json
          echo "SUPABASE_URL=$(jq -r '.api_url' supabase-status.json)" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(jq -r '.anon_key' supabase-status.json)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(jq -r '.service_role_key' supabase-status.json)" >> $GITHUB_ENV

      - name: 🧫 Vitest (unit + RLS tests)
        run: npm run test:run

      - name: 🧹 Stop Supabase (always)
        if: always()
        run: |
          npx supabase stop --no-backup

  e2e:
    name: 🎭 Playwright (E2E)
    runs-on: ubuntu-latest
    needs: quality-and-unit

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      # Required on GitHub runners for Playwright browsers
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run Playwright tests
        run: npm run test:e2e

      - name: 📎 Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
